sources:
- quote: Hear, O Israel; the LORD our God, the LORD is one.
  source: Deuteronomy 6:4 (Shema)
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Deuteronomy#Chapter_6
- quote: In the beginning, my dear, there was only Being, one, without a second.
  source: Chandogya Upanishad 6.2.1
  ref: https://en.wikisource.org/wiki/Chandogya_Upanishad
- quote: Say; He is Allah, the One. Allah, the Eternal, Absolute.
  source: "Qur\u2019an 112:1-2"
  ref: https://en.wikisource.org/wiki/The_Holy_Qur%27an_(Maulana_Muhammad_Ali)/112._The_Unity
- quote: Out beyond ideas of wrongdoing and rightdoing, there is a field. I'll meet you there.
  source: Rumi, Masnavi
  ref: https://en.wikiquote.org/wiki/Rumi
- quote: For in him we live, and move, and have our being.
  source: Acts 17:28
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Acts#Chapter_17
- quote: I am because we are.
  source: Ubuntu philosophy (Umuntu ngumuntu ngabantu)
  ref: https://en.wikipedia.org/wiki/Ubuntu_philosophy

