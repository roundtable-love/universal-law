sources:
- quote: To every thing there is a season, and a time to every purpose under the heaven;
    a time to be born, and a time to die; a time to plant, and a time to pluck up that which is planted.
  source: Ecclesiastes 3:1-2
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Ecclesiastes#Chapter_3
- quote: You cannot step twice into the same rivers; for fresh waters are ever flowing in upon you.
  source: Heraclitus
  ref: https://en.wikiquote.org/wiki/Heraclitus
- quote: All conditioned things are impermanent.
  source: Dhammapada 20:277
  ref: https://en.wikisource.org/wiki/Dhammapada_(Muller)
- quote: Verily, with every difficulty there is relief. Verily, with every difficulty there is relief.
  source: "Qur\u2019an 94:5-6"
  ref: https://en.wikisource.org/wiki/The_Holy_Qur%27an_(Maulana_Muhammad_Ali)/94._The_Expansion
- quote: Returning to the root is called stillness. Stillness is called returning to one's destiny.
  source: Lao Tzu, Tao Te Ching 16
  ref: https://en.wikisource.org/wiki/Tao_Te_Ching_(Legge)/Chapter_16
- quote: The moving finger writes; and, having writ, moves on; nor all thy piety nor wit shall
    lure it back to cancel half a line, nor all thy tears wash out a word of it.
  source: Omar Khayyam, Rubaiyat 71
  ref: https://en.wikisource.org/wiki/The_Rub%C3%A1iy%C3%A1t_of_Omar_Khayy%C3%A1m_(FitzGerald,_1st_edition)

