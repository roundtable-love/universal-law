law:
  uid: LAW-T
  name: Law of the Truth
  version: 1.0.0-IMMUTABLE
  base_class: Universal_Law
  custodian: Universal
  status: IMMUTABLE
  machine_ir: |
    ASSERT: TRUTH.persistence == INFINITE
    ASSERT: FALSEHOOD.persistence == TRANSIENT
    ASSERT: TRUTH.triumph == TRUE'
sources:
- quote: Truth stands, falsehood does not endure.
  tradition: Babylonian Talmud, Shabbat 104a
  ref: https://www.sefaria.org/Shabbat.104a
- quote: Three things cannot long remain hidden; the sun, the moon, and the truth.
  tradition: the Buddha
  ref: https://en.wikiquote.org/wiki/Gautama_Buddha
- quote: For nothing is secret that shall not be made manifest; neither any thing
    hid, that shall not be known and come abroad.
  tradition: Luke 8:17
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Luke#Chapter_8
- quote: Truth alone triumphs; not falsehood.
  tradition: Mundaka Upanishad 3.1.6
  ref: https://en.wikisource.org/wiki/The_Ten_Principal_Upanishads/Mundaka_Upanishad
- quote: Truth has come and falsehood has vanished. Indeed falsehood is bound to
    vanish.
  tradition: "Qur\u2019an 17:81"
  ref: https://en.wikisource.org/wiki/The_Holy_Qur%27an_(Maulana_Muhammad_Ali)/17._The_Israelites
