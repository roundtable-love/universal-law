quotes:
  uid: quotes-P
  name: Law of Polarity
  version: 1.0.0-IMMUTABLE
  base_class: Universal_Law
  machine_ir: 'ASSERT: EVERY_THING.has_opposite == TRUE; ASSERT: OPPOSITES.share_continuum == TRUE; ASSERT: HARMONY.source == OPPOSITION'

sources:
- quote: Being and non-being produce each other; difficult and easy complement each other;
    long and short contrast each other; high and low rest upon each other; voice and sound
    harmonize each other; front and back follow one another.
  source: Lao Tzu, Tao Te Ching 2
  ref: https://en.wikisource.org/wiki/Tao_Te_Ching_(Legge)/Chapter_2
- quote: Opposition brings concord. Out of discord comes the fairest harmony.
  source: Heraclitus
  ref: https://en.wikiquote.org/wiki/Heraclitus
- quote: And God saw the light, that it was good; and God divided the light from the darkness.
  source: Genesis 1:4
  ref: https://en.wikisource.org/wiki/Bible_(King_James)/Genesis#Chapter_1
- quote: O son of Kunti, the contact between the senses and the sense objects gives rise to
    fleeting perceptions of happiness and distress. These come and go like winter and summer seasons.
  source: Bhagavad Gita 2:14
  ref: https://en.wikisource.org/wiki/The_Bhagavad_Gita_(Radhakrishnan)/Chapter_2
- quote: The opposite of a correct statement is a false statement. But the opposite of a
    profound truth may well be another profound truth.
  source: Niels Bohr
  ref: https://en.wikiquote.org/wiki/Niels_Bohr

metadata:
  custodian: Universal
  status: IMMUTABLE
  source: universal-law/POLARITY.yaml
